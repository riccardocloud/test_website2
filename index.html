  <!-- FADING VIDEO -->
  <script type="text/babel">
    const FADE_MS = 500; const FADE_OUT_LEAD = 0.55;
    function FadingVideo({ src, className, style }) {
      const videoRef = React.useRef(null); const rafRef = React.useRef(null); const fadingOutRef = React.useRef(false);
      React.useEffect(() => {
        const video = videoRef.current; if (!video) return;
        const fadeTo = (target, duration) => {
          if (rafRef.current) cancelAnimationFrame(rafRef.current);
          const start = parseFloat(video.style.opacity) || 0; const delta = target - start; const t0 = performance.now();
          const step = (now) => { const t = duration > 0 ? Math.min((now - t0) / duration, 1) : 1; video.style.opacity = String(start + delta * t); if (t < 1) rafRef.current = requestAnimationFrame(step); else rafRef.current = null; };
          rafRef.current = requestAnimationFrame(step);
        };
        const onLoaded = () => { video.style.opacity = "0"; const p = video.play(); if (p && p.catch) p.catch(() => {}); fadeTo(1, FADE_MS); };
        const onTime = () => { const r = video.duration - video.currentTime; if (!fadingOutRef.current && r <= FADE_OUT_LEAD && r > 0) { fadingOutRef.current = true; fadeTo(0, FADE_MS); } };
        const onEnded = () => { video.style.opacity = "0"; setTimeout(() => { video.currentTime = 0; const p = video.play(); if (p && p.catch) p.catch(() => {}); fadingOutRef.current = false; fadeTo(1, FADE_MS); }, 100); };
        video.addEventListener("loadeddata", onLoaded); video.addEventListener("timeupdate", onTime); video.addEventListener("ended", onEnded);
        if (video.readyState >= 2) onLoaded();
        return () => { if (rafRef.current) cancelAnimationFrame(rafRef.current); video.removeEventListener("loadeddata", onLoaded); video.removeEventListener("timeupdate", onTime); video.removeEventListener("ended", onEnded); };
      }, [src]);
      return <video ref={videoRef} className={className} style={{ opacity: 0, ...style }} src={src} autoPlay muted playsInline preload="auto" />;
    }
    window.FadingVideo = FadingVideo;
  </script>

  <!-- BLUR TEXT -->
  <script type="text/babel">
    function BlurText({ text, className }) {
      const { motion } = window.Motion; const ref = React.useRef(null); const [inView, setInView] = React.useState(false); const words = text.split(" ");
      React.useEffect(() => {
        const el = ref.current; if (!el) return;
        const obs = new IntersectionObserver((entries) => entries.forEach((e) => { if (e.isIntersecting) { setInView(true); obs.unobserve(el); } }), { threshold: 0.1 });
        obs.observe(el); return () => obs.disconnect();
      }, []);
      return (
        <p ref={ref} className={className} style={{ display: "flex", flexWrap: "wrap", rowGap: "0.1em" }}>
          {words.map((w, i) => (
            <motion.span key={i} style={{ display: "inline-block", marginRight: "0.28em" }}
              initial={{ filter: "blur(10px)", opacity: 0, y: 50 }}
              animate={inView ? { filter: ["blur(10px)", "blur(5px)", "blur(0px)"], opacity: [0, 0.5, 1], y: [50, -5, 0] } : {}}
              transition={{ duration: 0.7, times: [0, 0.5, 1], ease: "easeOut", delay: (i * 100) / 1000 }}>
              {w}
            </motion.span>
          ))}
        </p>
      );
    }
    window.BlurText = BlurText;
  </script>

  <!-- ANIMATED CHIPS — staggered blur-in + spring hover -->
  <script type="text/babel">
    function Chips({ items, className = "", accentSet }) {
      const { motion } = window.Motion;
      const parent = { hidden: {}, show: { transition: { staggerChildren: 0.045, delayChildren: 0.05 } } };
      const child = {
        hidden: { opacity: 0, y: 14, filter: "blur(6px)" },
        show: { opacity: 1, y: 0, filter: "blur(0px)", transition: { type: "spring", stiffness: 280, damping: 22 } },
      };
      return (
        <motion.div className={"flex flex-wrap gap-2.5 " + className}
          variants={parent} initial="hidden" whileInView="show" viewport={{ once: true, amount: 0.3 }}>
          {items.map((it, i) => {
            const hot = accentSet && accentSet.has(it);
            return (
              <motion.span key={it + i} variants={child}
                whileHover={{ y: -4, scale: 1.06, transition: { type: "spring", stiffness: 420, damping: 14 } }}
                className={(hot ? "glass-accent text-accent" : "liquid-glass text-white/90") + " rounded-full px-4 py-2 text-sm font-body cursor-default select-none"}>
                {it}
              </motion.span>

      );
    }

  <script type="text/babel">
    function ScrollProgress() {
      const ref = React.useRef(null);
      React.useEffect(() => {
        const onScroll = () => { const h = document.documentElement; const pct = (h.scrollTop / (h.scrollHeight - h.clientHeight)) * 100; if (ref.current) ref.current.style.width = pct + "%"; };
        window.addEventListener("scroll", onScroll, { passive: true }); onScroll();
        return () => window.removeEventListener("scroll", onScroll);
      }, []);
      return <div ref={ref} className="scroll-progress" />;
    }
    function App() {
      const { Navbar, Hero, Featured, Toolkit, About, Work, Close } = window;
      return (
        <div className="bg-black">
          <ScrollProgress />
          <Navbar />
          <Hero />
          <Featured />
          <Toolkit />
          <About />
          <Work />
          <Close />
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
